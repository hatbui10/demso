<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Counter - Dảkk Mode v2</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #1f6feb;
            --success: #3fb950;
            --border: #30363d;
            --danger: #f85149;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 30px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 850px;
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            color: var(--accent);
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            transition: 0.3s;
        }

        .upload-section:hover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            background-color: var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .custom-file-upload:hover {
            background-color: #484f58;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #79c0ff;
            padding: 1rem;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-analyze:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .results {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            display: none;
        }

        .stat-card {
            background: #0d1117;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-value {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DarK COUNTER PRO</h2>
    
    <div class="upload-section">
        <span style="color: var(--text-secondary)">Chọn file .txt từ máy tính</span>
        <label for="fileInput" class="custom-file-upload">
            📁 Tải file lên
        </label>
        <input type="file" id="fileInput" accept=".txt">
        <div id="fileName" style="font-size: 0.85rem; color: var(--accent)"></div>
    </div>

    <textarea id="inputText" placeholder="Hoặc dán nội dung vào đây..."></textarea>
    
    <button class="btn-analyze" onclick="analyzeText()">BẮT ĐẦU PHÂN TÍCH</button>

    <div class="results" id="resultArea">
        <div class="stat-card">
            <span class="stat-value" id="digitCount" style="color: #79c0ff;">0</span>
            <span class="stat-label">Tổng chữ số</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="totalCount" style="color: var(--text-primary);">0</span>
            <span class="stat-label">Tổng ký tự</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="otherCount" style="color: var(--danger);">0</span>
            <span class="stat-label">Ký tự khác</span>
        </div>
    </div>
</div>

<script>
    // Xử lý khi chọn file
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').textContent = "Đã chọn: " + file.name;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('inputText').value = e.target.result;
            analyzeText(); // Tự động phân tích sau khi tải file
        };
        reader.readAsText(file);
    });

    function analyzeText() {
        const text = document.getElementById('inputText').value;
        if (!text) {
            alert("Vui lòng nhập nội dung hoặc chọn file!");
            return;
        }
        
        // Đếm tổng chữ số (0-9)
        const digits = text.match(/\d/g);
        const digitCount = digits ? digits.length : 0;
        
        // Đếm tổng ký tự
        const totalCount = text.length;
        
        // Tính ký tự khác
        const otherCount = totalCount - digitCount;

        // Hiển thị kết quả
        document.getElementById('digitCount').innerText = digitCount.toLocaleString();
        document.getElementById('totalCount').innerText = totalCount.toLocaleString();
        document.getElementById('otherCount').innerText = otherCount.toLocaleString();
        
        document.getElementById('resultArea').style.display = 'grid';
    }
</script>

</body>
</html>
